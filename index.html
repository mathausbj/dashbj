<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banana Jobs · Recruiting Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface2:#f8f9fb;
  --border:#e4e7ec;
  --border2:#d0d5dd;
  --text:#101828;
  --text2:#344054;
  --muted:#667085;
  --muted2:#98a2b3;
  --teal:#00b8a9;
  --teal-light:#e6f9f7;
  --blue:#2563eb;
  --blue-light:#eff6ff;
  --orange:#f97316;
  --orange-light:#fff7ed;
  --purple:#7c3aed;
  --purple-light:#f5f3ff;
  --yellow:#d97706;
  --yellow-light:#fffbeb;
  --green:#059669;
  --green-light:#ecfdf5;
  --red:#dc2626;
  --nav:#0f172a;
  --nav2:#1e293b;
  --radius:10px;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 8px -2px rgba(16,24,40,.08),0 2px 4px -2px rgba(16,24,40,.04);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.5;}

/* ── NAV LATERAL ── */
nav{width:56px;background:var(--nav);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.nav-brand{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:12px;flex-shrink:0;}
.nav-brand img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1);}
.nav-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:16px;cursor:pointer;transition:all .15s;text-decoration:none;}
.nav-ico:hover{background:var(--nav2);color:#94a3b8;}
.nav-ico.active{background:rgba(0,184,169,.15);color:var(--teal);}
.nav-ico.bottom{margin-top:auto;}

/* ── MAIN ── */
.main{flex:1;margin-left:56px;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
.topbar-logo{height:20px;filter:brightness(0) drop-shadow(0 0 1.5px #f2c811) drop-shadow(0 0 1.5px #f2c811);}
.topbar-divider{width:1px;height:20px;background:var(--border);margin:0 4px;}
.topbar-title{font-size:14px;font-weight:600;color:var(--text);}
.topbar-vaga{font-size:13px;color:var(--muted);font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}

.btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 1px 2px rgba(0,184,169,.3);}
.btn-primary:hover{background:#00a396;}

.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.status-pill.live{background:var(--green-light);color:var(--green);}
.status-pill.idle{background:var(--yellow-light);color:var(--yellow);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── VIEW TABS ── */
.view-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:3px;gap:2px;}
.view-tab{height:26px;padding:0 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.view-tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:var(--shadow);}

/* ── CONTENT ── */
.content{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;}

/* ── UPLOAD ── */
.upload-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border:2px dashed var(--border2);border-radius:16px;background:var(--surface);padding:60px 40px;cursor:pointer;transition:all .2s;text-align:center;min-height:400px;}
.upload-zone:hover{border-color:var(--teal);background:var(--teal-light);}
.upload-icon{width:56px;height:56px;background:var(--teal-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.upload-zone h3{font-size:16px;font-weight:600;color:var(--text);}
.upload-zone p{font-size:13px;color:var(--muted);max-width:340px;line-height:1.6;}
.upload-hint{font-size:11px;color:var(--teal);font-weight:600;background:var(--teal-light);padding:4px 12px;border-radius:20px;}
input[type=file]{display:none;}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s;}
.kpi-card:hover{box-shadow:var(--shadow-md);}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px;}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.kpi-value{font-size:28px;font-weight:300;color:var(--text);letter-spacing:-1.5px;line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--muted2);}
.kpi-sub b{font-weight:600;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-header{padding:14px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-body{padding:14px 16px;}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.flex-row{display:flex;gap:16px;align-items:stretch;}
.flex-row .card{flex:1;min-width:0;}

/* ── WATERFALL ── */
.wf-wrap{display:flex;align-items:center;overflow-x:auto;padding:8px 0 4px;gap:0;}
.wf-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.wf-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;min-width:120px;border-top-width:3px;transition:box-shadow .15s;}
.wf-box:hover{box-shadow:var(--shadow-md);}
.wf-stage{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);margin-bottom:6px;}
.wf-count{font-size:26px;font-weight:300;color:var(--text);letter-spacing:-1px;line-height:1;}
.wf-unit{font-size:9px;color:var(--muted2);margin-top:3px;}
.wf-arrow{display:flex;flex-direction:column;align-items:center;padding:0 8px;min-width:88px;flex-shrink:0;}
.wf-rate{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:2px;}
.wf-ratio{font-size:9px;color:var(--muted2);margin-bottom:5px;}
.wf-line{display:flex;align-items:center;width:100%;}
.wf-dash{flex:1;height:1.5px;background:var(--border2);}
.wf-head{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid var(--border2);}

/* ── CONV CARDS ── */
.conv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.conv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);text-align:center;}
.conv-label{font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.conv-rate{font-size:24px;font-weight:300;letter-spacing:-1px;line-height:1;margin-bottom:2px;}
.conv-desc{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;}

/* ── CALC ── */
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;width:280px;flex-shrink:0;}
.calc-header{background:var(--nav);padding:12px 14px;}
.calc-header-title{font-size:12px;font-weight:600;color:#f1f5f9;letter-spacing:.2px;}
.calc-header-sub{font-size:10px;color:#475569;margin-top:1px;}
.calc-mode-wrap{display:flex;background:#1e293b;border-radius:6px;padding:2px;gap:2px;margin-top:10px;}
.calc-mode-btn{flex:1;height:24px;border-radius:4px;border:none;background:transparent;font-family:inherit;font-size:10px;font-weight:600;color:#475569;cursor:pointer;transition:all .12s;}
.calc-mode-btn.on{background:#334155;color:#e2e8f0;}
.calc-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.calc-field-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.calc-select{width:100%;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;color:var(--text);padding:0 8px;outline:none;cursor:pointer;}
.calc-select:focus{border-color:var(--teal);}
.calc-panels{display:grid;grid-template-columns:1fr 32px 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.calc-panel{padding:10px 10px;}
.calc-panel.left{border-right:1px solid var(--border);}
.calc-panel-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.calc-input{width:100%;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:16px;font-weight:300;color:var(--text);padding:0 8px;outline:none;text-align:center;letter-spacing:-0.5px;}
.calc-input:focus{border-color:var(--teal);}
.calc-result-val{font-size:16px;font-weight:300;letter-spacing:-0.5px;height:34px;display:flex;align-items:center;justify-content:center;}
.calc-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface2);padding:4px 2px;gap:2px;}
.calc-mid-arrow{font-size:14px;color:var(--muted2);}
.calc-mid-rate{font-size:9px;font-weight:700;color:var(--teal);}
.calc-breakdown{background:var(--surface2);border-top:1px solid var(--border);padding:10px 14px;}
.calc-breakdown-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);margin-bottom:6px;}
.calc-step{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);}
.calc-step:last-child{border-bottom:none;}
.calc-step-rate{font-weight:700;color:var(--text);font-size:10px;}
.calc-calc-btn{width:100%;height:32px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.calc-calc-btn:hover{background:#00a396;}

/* ── CHART BARE ── */
.chart-wrap{position:relative;width:100%;}

/* ── ESTIMATE SECTION ── */
.est-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.est-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.est-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.est-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.est-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.est-lbl{font-size:11px;color:var(--muted);}
.est-val{font-size:18px;font-weight:300;letter-spacing:-1px;}
.est-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px;}
.est-fill{height:100%;border-radius:3px;transition:width .8s;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:8px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--surface2);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--teal);}
tbody td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--teal-light);}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
.tag-teal{background:var(--teal-light);color:var(--teal);}
.tag-blue{background:var(--blue-light);color:var(--blue);}
.tag-orange{background:var(--orange-light);color:var(--orange);}
.tag-purple{background:var(--purple-light);color:var(--purple);}
.tag-yellow{background:var(--yellow-light);color:var(--yellow);}
.tag-green{background:var(--green-light);color:var(--green);}
.tag-red{background:#fef2f2;color:var(--red);}

/* ── CHARTS ── */
.bar-wrap{display:flex;flex-direction:column;gap:6px;padding:4px 0;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:11px;color:var(--text2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s;}
.bar-count{font-size:10px;color:var(--muted);width:24px;text-align:right;flex-shrink:0;}

/* ── WARN ── */
.warn-badge{display:inline-flex;align-items:center;gap:6px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:6px 10px;font-size:11px;color:#92400e;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--nav);color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;z-index:999;transform:translateY(70px);opacity:0;transition:all .25s;max-width:340px;box-shadow:var(--shadow-md);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:3px solid var(--teal);}
.toast.error{border-left:3px solid var(--red);}
</style>
</head>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".csv" onchange="handleFile(this)">

<script>
// ── Paleta ──
const C={teal:'#00b8a9',blue:'#2563eb',orange:'#f97316',purple:'#7c3aed',yellow:'#d97706',green:'#059669',red:'#dc2626',pink:'#db2777'};
const PAL=Object.values(C);

// ── Estado ──
let currentData=null, currentView='historical', charts={};
let FUNNEL_STAGES=[], FUNNEL_RATES={};

// ── Drag & Drop ──
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f&&f.name.endsWith('.csv')){const r=new FileReader();r.onload=ev=>parseAndRender(ev.target.result,f.name);r.readAsText(f);}
  else toast('Arquivo deve ser .csv','error');
});

// ── Lê arquivo ──
function handleFile(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>parseAndRender(e.target.result,f.name);r.readAsText(f);
}

// ── Parseia CSV ──
function parseAndRender(text,filename){
  try{
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2)throw new Error('CSV vazio');
    const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
    const iStage=headers.findIndex(h=>h.toLowerCase().includes('stage'));
    const iNew=headers.findIndex(h=>h.toLowerCase().includes('new'));
    const iActive=headers.findIndex(h=>h.toLowerCase().includes('active'));
    const iHist=headers.findIndex(h=>h.toLowerCase().includes('historical'));
    if(iStage<0)throw new Error('Coluna "Stage name" não encontrada');
    const rows=lines.slice(1).map(line=>{
      const cols=line.split(',').map(c=>c.replace(/"/g,'').trim());
      return{stage:cleanStage(cols[iStage]||''),newOpp:parseInt(cols[iNew]||0)||0,activeOpp:parseInt(cols[iActive]||0)||0,historicalOpp:parseInt(cols[iHist]||0)||0};
    }).filter(r=>r.stage);
    currentData=rows;
    const vagaName=filename.replace('Pipeline_opportunity_volume_','').replace('.csv','').replace(/_/g,' ').replace(/\(\d+\)/,'').trim()||'Vaga';
    document.getElementById('vagaName').textContent=vagaName;
    const sp=document.getElementById('statusPill');
    sp.className='status-pill live';
    document.getElementById('statusTxt').textContent='Ao vivo';
    buildFunnelStages(rows);
    renderDashboard();
    toast(`✓ ${rows.length} stages carregados · ${vagaName}`,'success');
  }catch(e){toast('Erro ao ler CSV: '+e.message,'error');}
}

function cleanStage(raw){return raw.split('|')[0].trim();}

// ── View ──
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',
    (v==='historical'&&b.textContent==='Histórico total')||(v==='active'&&b.textContent==='Ativos agora')
  ));
  if(currentData)renderDashboard();
}

function val(row){return currentView==='active'?row.activeOpp:row.historicalOpp;}
function viewLabel(){return currentView==='active'?'Ativos agora':'Histórico total';}

// ── Funnel stages ──
function buildFunnelStages(d){
  const find=kws=>d.find(r=>kws.some(k=>r.stage.toLowerCase().includes(k.toLowerCase())));
  const sReached=find(['reached out','reach out']);
  const s2nd=find(['2nd','second']);
  const sResponded=find(['responded']);
  const sBJInt=find(['banana jobs interview','bj interview']);
  const sBJAprovR=find(['aprovado banana','aprovado bj','approved']);
  const sClient1=find(['client interview (1)','client interview 1']);

  const totalAbord=(sReached?val(sReached):0)+(s2nd?val(s2nd):0);
  const sBJAprov=sBJAprovR&&sClient1&&val(sBJAprovR)<val(sClient1)
    ?{...sBJAprovR,activeOpp:sClient1.activeOpp,newOpp:sClient1.newOpp,historicalOpp:sClient1.historicalOpp}
    :sBJAprovR;

  FUNNEL_STAGES=[
    {key:'reached',  label:'Reach Out',            vol:sReached?val(sReached):0},
    {key:'responded',label:'Responded',             vol:sResponded?val(sResponded):0},
    {key:'bjInt',    label:'Banana Jobs Interview', vol:sBJInt?val(sBJInt):0},
    {key:'bjAprov',  label:'Aprovado BJ',           vol:sBJAprov?val(sBJAprov):0},
    {key:'client1',  label:'Client Interview (1)',  vol:sClient1?val(sClient1):0},
  ];

  const r=(a,b)=>a&&b&&val(b)>0?val(a)/val(b):null;
  FUNNEL_RATES={
    'reached->responded': totalAbord>0&&sResponded?val(sResponded)/totalAbord:null,
    'responded->bjInt':   r(sBJInt,sResponded),
    'bjInt->bjAprov':     r(sBJAprov,sBJInt),
    'bjAprov->client1':   r(sClient1,sBJAprov),
  };
}

// ── Render completo ──
function renderDashboard(){
  const d=currentData;
  // Nodes
  const find=kws=>d.find(r=>kws.some(k=>r.stage.toLowerCase().includes(k.toLowerCase())));
  const sNewLead=find(['new lead','new applicant','lead']);
  const sReached=find(['reached out','reach out']);
  const s2nd=find(['2nd','second']);
  const sResponded=find(['responded']);
  const sBJInt=find(['banana jobs interview','bj interview']);
  const sBJAprovR=find(['aprovado banana','aprovado bj','approved']);
  const sClient1=find(['client interview (1)','client interview 1']);
  const sClient2=find(['client interview (2)','client interview 2']);
  const empty={activeOpp:0,newOpp:0,historicalOpp:0};

  const sBJAprov=sBJAprovR&&sClient1&&val(sBJAprovR)<val(sClient1)
    ?{...sBJAprovR,activeOpp:sClient1.activeOpp,newOpp:sClient1.newOpp,historicalOpp:sClient1.historicalOpp}
    :sBJAprovR;

  const totalAbord=(sReached?val(sReached):0)+(s2nd?val(s2nd):0);
  const cv=(a,b)=>a&&b&&val(b)>0?Math.round(val(a)/val(b)*100):null;

  const roRate=sResponded&&totalAbord>0?Math.round(val(sResponded)/totalAbord*100):null;
  const secondRORate=sReached&&val(sReached)>0&&s2nd?Math.round(val(s2nd)/val(sReached)*100):null;
  const bjRate=cv(sBJInt,sResponded);
  const aprovRate=cv(sBJAprov,sBJInt);
  const clientRate=cv(sClient1,sBJAprov);

  // Estimativa 1ª vs 2ª abordagem
  const ro1Total=sReached&&s2nd?Math.max(val(sReached)-val(s2nd),0):null;
  const ro2Total=s2nd?val(s2nd):null;
  const responded=sResponded?val(sResponded):0;
  const ro1Weight=ro1Total!==null&&totalAbord>0?ro1Total/totalAbord:null;
  const ro2Weight=ro2Total!==null&&totalAbord>0?ro2Total/totalAbord:null;
  const ro1Responded=ro1Weight!==null?Math.round(responded*ro1Weight):null;
  const ro2Responded=ro2Weight!==null?Math.round(responded*ro2Weight):null;
  const ro1Rate=ro1Total&&ro1Total>0&&ro1Responded!==null?Math.round(ro1Responded/ro1Total*100):null;
  const ro2Rate=ro2Total&&ro2Total>0&&ro2Responded!==null?Math.round(ro2Responded/ro2Total*100):null;

  // Selects da calculadora
  const stageOpts=FUNNEL_STAGES.map(s=>`<option value="${s.key}">${s.label}</option>`).join('');

  document.getElementById('content').innerHTML=`

    <!-- KPIs -->
    <div class="kpi-grid">
      ${kpi('Total Adicionados','New leads na vaga',val(sNewLead||d[0]),'📥',C.blue,'--kc:'+C.blue,`${d.length} stages no funil`)}
      ${kpi('2nd Reach Out','Precisaram de 2ª tentativa',secondRORate!==null?secondRORate+'%':'—','🔁',C.orange,'--kc:'+C.orange,secondRORate!==null?`${val(s2nd||empty)} candidatos`:'dados insuficientes')}
      ${kpi('Taxa de Resposta','(1ª + 2ª) → Responded',roRate!==null?roRate+'%':'—','💬',C.purple,'--kc:'+C.purple,roRate!==null?`${val(sResponded||empty)} responderam`:'dados insuficientes')}
      ${kpi('Taxa de Interesse','Responded → BJ Interview',bjRate!==null?bjRate+'%':'—','🎯',C.teal,'--kc:'+C.teal,bjRate!==null?`${val(sBJInt||empty)} toparam`:'dados insuficientes')}
      ${kpi('Enviados ao Cliente','Aprovado BJ → Client Interview',clientRate!==null?clientRate+'%':'—','⭐',C.green,'--kc:'+C.green,clientRate!==null?`${val(sClient1||empty)} candidatos`:'dados insuficientes')}
    </div>

    <!-- Waterfall + Calculadora -->
    <div class="flex-row" style="align-items:stretch;">
      <div class="card" style="flex:1;min-width:0;">
        <div class="card-header">
          <div>
            <div class="card-title">Funil de Conversão</div>
            <div class="card-sub">${viewLabel()} · reach out → responded → entrevista → cliente</div>
          </div>
        </div>
        <div class="card-body">
          <div class="wf-wrap">
            ${wfNode(val(sReached||empty),'Reach Out','1ª tentativa',C.teal)}
            ${wfArrow(roRate,totalAbord>0&&val(sResponded||empty)>0?(totalAbord/val(sResponded||empty)).toFixed(1):null)}
            ${wfNode(val(sResponded||empty),'Responded','sim ou não',C.blue)}
            ${wfArrow(bjRate,val(sResponded||empty)>0&&val(sBJInt||empty)>0?(val(sResponded||empty)/val(sBJInt||empty)).toFixed(1):null)}
            ${wfNode(val(sBJInt||empty),'Banana Jobs Interview','bj interview',C.orange)}
            ${wfArrow(aprovRate,val(sBJInt||empty)>0&&val(sBJAprov||empty)>0?(val(sBJInt||empty)/val(sBJAprov||empty)).toFixed(1):null)}
            ${wfNode(val(sBJAprov||empty),'Aprovados BJ','aprovado banana jobs',C.purple)}
            ${wfArrow(clientRate,val(sBJAprov||empty)>0&&val(sClient1||empty)>0?(val(sBJAprov||empty)/val(sClient1||empty)).toFixed(1):null)}
            ${wfNode(val(sClient1||empty),'Cliente','client interview (1)',C.green)}
          </div>
        </div>
      </div>

      <!-- Calculadora -->
      <div class="calc-card">
        <div class="calc-header">
          <div class="calc-header-title">Calculadora de Funil</div>
          <div class="calc-header-sub">engenharia direta ou reversa</div>
          <div class="calc-mode-wrap">
            <button class="calc-mode-btn on" onclick="setCalcMode('reverse')">▼ Quantos preciso?</button>
            <button class="calc-mode-btn" onclick="setCalcMode('forward')">▲ Quantos terei?</button>
          </div>
        </div>
        <div class="calc-body">
          <div>
            <div class="calc-field-lbl" id="calcLeftLbl">Etapa destino</div>
            <select class="calc-select" id="calcTo" onchange="runCalc()">
              ${FUNNEL_STAGES.map(s=>`<option value="${s.key}" ${s.key==='bjAprov'?'selected':''}>${s.label}</option>`).join('')}
            </select>
          </div>
          <div>
            <div class="calc-field-lbl" id="calcRightLbl">Etapa origem</div>
            <select class="calc-select" id="calcFrom" onchange="runCalc()">
              ${FUNNEL_STAGES.map(s=>`<option value="${s.key}" ${s.key==='bjInt'?'selected':''}>${s.label}</option>`).join('')}
            </select>
          </div>
          <div class="calc-panels">
            <div class="calc-panel left">
              <div class="calc-panel-lbl" id="calcPanelLeftLbl" style="color:var(--teal)">Quero chegar em</div>
              <input class="calc-input" id="calcInput" type="number" value="5" min="1" oninput="runCalc()">
            </div>
            <div class="calc-mid">
              <div class="calc-mid-arrow" id="calcArrow">←</div>
              <div class="calc-mid-rate" id="calcMidRate">—</div>
            </div>
            <div class="calc-panel">
              <div class="calc-panel-lbl" id="calcPanelRightLbl" style="color:var(--orange)">Precisará de</div>
              <div class="calc-result-val" id="calcResult" style="color:var(--orange)">—</div>
            </div>
          </div>
          <button class="calc-calc-btn" onclick="runCalc()">Calcular</button>
        </div>
        <div class="calc-breakdown">
          <div class="calc-breakdown-title">Breakdown</div>
          <div id="calcBreakdown"><div style="font-size:11px;color:var(--muted2);font-style:italic;">Selecione as etapas acima</div></div>
        </div>
      </div>
    </div>

    <!-- Conv cards -->
    <div class="conv-grid">
      ${convCard('Reach Out → Responded',roRate,C.teal)}
      ${convCard('Responded → BJ Interview',bjRate,C.orange)}
      ${convCard('BJ Interview → Aprovado BJ',aprovRate,C.purple)}
      ${convCard('BJ Interview → Client Interview (1)',cv(sClient1,sBJInt),C.blue)}
    </div>

    <!-- Charts row -->
    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Volume por Stage</div><div class="card-sub">${viewLabel()}</div></div>
        </div>
        <div class="card-body">
          <div class="bar-wrap" id="barWrap"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Ativos × Histórico</div><div class="card-sub">Comparativo por stage</div></div>
        </div>
        <div class="card-body"><div class="chart-wrap" style="height:200px;"><canvas id="compareChart"></canvas></div></div>
      </div>
    </div>

    <!-- Estimativa reach out -->
    <div class="card">
      <div class="card-header" style="padding-bottom:12px;">
        <div>
          <div class="card-title">Retorno por Abordagem — Estimativa</div>
          <div class="card-sub">Distribuição proporcional · o Lever não separa esse dado nativamente</div>
        </div>
        <div class="warn-badge">⚠️ Estimativa proporcional · não reflete rastreamento individual</div>
      </div>
      <div class="card-body">
        <div class="est-grid">
          <div class="est-card">
            <div class="est-title"><div class="est-dot" style="background:${C.teal}"></div>1ª Abordagem (Reached out)</div>
            <div class="est-row">
              <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px;">Abordados exclusivos</div><div class="est-val" style="color:var(--text)">${ro1Total!==null?ro1Total:'—'}</div></div>
              <div style="text-align:right"><div style="font-size:10px;color:var(--muted);margin-bottom:2px;">Respostas estimadas</div><div class="est-val" style="color:${C.teal}">${ro1Responded!==null?ro1Responded:'—'}</div></div>
            </div>
            <div style="font-size:11px;color:var(--muted2);margin-top:4px;">~${ro1Rate!==null?ro1Rate+'%':'—'} de retorno estimado</div>
            ${ro1Rate!==null?`<div class="est-bar"><div class="est-fill" style="width:${Math.min(ro1Rate,100)}%;background:${C.teal}"></div></div>`:''}
          </div>
          <div class="est-card">
            <div class="est-title"><div class="est-dot" style="background:${C.orange}"></div>2ª Abordagem (2nd Reach Out)</div>
            <div class="est-row">
              <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px;">Abordados</div><div class="est-val" style="color:var(--text)">${ro2Total!==null?ro2Total:'—'}</div></div>
              <div style="text-align:right"><div style="font-size:10px;color:var(--muted);margin-bottom:2px;">Respostas estimadas</div><div class="est-val" style="color:${C.orange}">${ro2Responded!==null?ro2Responded:'—'}</div></div>
            </div>
            <div style="font-size:11px;color:var(--muted2);margin-top:4px;">~${ro2Rate!==null?ro2Rate+'%':'—'} de retorno estimado</div>
            ${ro2Rate!==null?`<div class="est-bar"><div class="est-fill" style="width:${Math.min(ro2Rate,100)}%;background:${C.orange}"></div></div>`:''}
          </div>
        </div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="card">
      <div class="card-header" style="padding-bottom:12px;">
        <div><div class="card-title">Detalhamento por Stage</div><div class="card-sub">${d.length} stages · ${viewLabel()}</div></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Stage</th><th>Novos (semana)</th><th>Ativos agora</th><th>Histórico total</th><th>Conv. p/ próximo</th><th>% do pipeline</th>
          </tr></thead>
          <tbody>
            ${d.map((r,i)=>{
              const next=d[i+1];
              const convNext=next&&r.historicalOpp>0?Math.round(next.historicalOpp/r.historicalOpp*100):null;
              const pct=d[0].historicalOpp>0?Math.round(r.historicalOpp/d[0].historicalOpp*100):0;
              const color=PAL[i%PAL.length];
              return`<tr>
                <td style="font-weight:500">${r.stage}</td>
                <td><span class="tag tag-blue">${r.newOpp}</span></td>
                <td><span class="tag tag-teal">${r.activeOpp}</span></td>
                <td style="font-weight:500">${r.historicalOpp}</td>
                <td>${convNext!==null?`<span class="tag tag-orange">${convNext}%</span>`:'—'}</td>
                <td style="min-width:120px;">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
                      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;"></div>
                    </div>
                    <span style="font-size:10px;color:var(--muted2);width:30px;">${pct}%</span>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  renderBarWrap(d);
  renderCompareChart(d);
  setTimeout(()=>runCalc(),50);
}

// ── Helpers HTML ──
function kpi(label,sub,value,icon,color,style,delta){
  return`<div class="kpi-card" style="${style}">
    <div class="kpi-accent" style="background:${color}"></div>
    <div class="kpi-icon" style="background:${color}22;">${icon}</div>
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-sub">${sub}<br><b>${delta}</b></div>
  </div>`;
}

function wfNode(count,label,sub,color){
  return`<div class="wf-node">
    <div class="wf-box" style="border-top-color:${color}">
      <div class="wf-stage">${label}</div>
      <div class="wf-count">${count}</div>
      <div class="wf-unit">${sub}</div>
    </div>
  </div>`;
}

function wfArrow(rate,ratio){
  const r=ratio?(parseFloat(ratio)%1===0?parseInt(ratio):ratio):null;
  return`<div class="wf-arrow">
    <div class="wf-rate">${rate!==null?rate+'%':'—'}</div>
    <div class="wf-ratio">${r?'1 em cada '+r:''}</div>
    <div class="wf-line"><div class="wf-dash"></div><div class="wf-head"></div></div>
  </div>`;
}

function convCard(label,rate,color){
  return`<div class="conv-card">
    <div class="conv-label">${label}</div>
    <div class="conv-rate" style="color:${rate!==null?color:'#d1d5db'}">${rate!==null?rate+'%':'—'}</div>
    <div class="conv-desc">taxa de conversão</div>
  </div>`;
}

// ── Charts ──
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function renderBarWrap(d){
  const el=document.getElementById('barWrap');if(!el)return;
  const max=Math.max(...d.map(r=>val(r)),1);
  el.innerHTML=d.map((r,i)=>`
    <div class="bar-row">
      <div class="bar-label" title="${r.stage}">${r.stage}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val(r)/max*100)}%;background:${PAL[i%PAL.length]}"></div></div>
      <div class="bar-count">${val(r)}</div>
    </div>`).join('');
}

function renderCompareChart(d){
  dc('cmp');const el=document.getElementById('compareChart');if(!el)return;
  charts.cmp=new Chart(el,{type:'bar',data:{
    labels:d.map(r=>r.stage),
    datasets:[
      {label:'Ativos',data:d.map(r=>r.activeOpp),backgroundColor:C.teal+'cc',borderRadius:3},
      {label:'Histórico',data:d.map(r=>r.historicalOpp),backgroundColor:'#94a3b8cc',borderRadius:3},
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{color:'#667085',font:{family:'DM Sans',size:10},padding:10,boxWidth:10}}},scales:{x:{ticks:{color:'#98a2b3',font:{family:'DM Sans',size:9},maxRotation:25},grid:{display:false}},y:{ticks:{color:'#98a2b3',font:{family:'DM Sans',size:9}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}

// ── Calculadora ──
let calcMode='reverse';

function setCalcMode(mode){
  calcMode=mode;
  document.querySelectorAll('.calc-mode-btn').forEach(b=>b.classList.toggle('on',
    (mode==='reverse'&&b.textContent.includes('preciso'))||(mode==='forward'&&b.textContent.includes('terei'))
  ));
  const ll=document.getElementById('calcLeftLbl');
  const rl=document.getElementById('calcRightLbl');
  const pll=document.getElementById('calcPanelLeftLbl');
  const prl=document.getElementById('calcPanelRightLbl');
  const ar=document.getElementById('calcArrow');
  if(mode==='reverse'){
    if(ll)ll.textContent='Etapa destino';if(rl)rl.textContent='Etapa origem';
    if(pll){pll.textContent='Quero chegar em';pll.style.color='var(--teal)';}
    if(prl){prl.textContent='Precisará de';prl.style.color='var(--orange)';}
    if(ar)ar.textContent='←';
  }else{
    if(ll)ll.textContent='Etapa origem';if(rl)rl.textContent='Etapa destino';
    if(pll){pll.textContent='Tenho disponível';pll.style.color='var(--orange)';}
    if(prl){prl.textContent='Chegará em';prl.style.color='var(--teal)';}
    if(ar)ar.textContent='→';
  }
  runCalc();
}

function runCalc(){
  const fromEl=document.getElementById('calcFrom');
  const toEl=document.getElementById('calcTo');
  const inputEl=document.getElementById('calcInput');
  const resEl=document.getElementById('calcResult');
  const rateEl=document.getElementById('calcMidRate');
  const bdEl=document.getElementById('calcBreakdown');
  if(!fromEl||!toEl||!inputEl||!FUNNEL_STAGES.length)return;

  const inputVal=parseFloat(inputEl.value)||0;
  const originKey=calcMode==='reverse'?fromEl.value:toEl.value;
  const destKey=calcMode==='reverse'?toEl.value:fromEl.value;
  const originIdx=FUNNEL_STAGES.findIndex(s=>s.key===originKey);
  const destIdx=FUNNEL_STAGES.findIndex(s=>s.key===destKey);

  if(originIdx<0||destIdx<0||originIdx===destIdx){
    if(resEl)resEl.textContent='—';if(rateEl)rateEl.textContent='—';
    if(bdEl)bdEl.innerHTML='<div style="font-size:11px;color:var(--muted2);font-style:italic;">Selecione etapas diferentes</div>';
    return;
  }

  const fromIdx=Math.min(originIdx,destIdx);
  const toIdx=Math.max(originIdx,destIdx);
  let chainRate=1;
  const steps=[];

  for(let i=fromIdx;i<toIdx;i++){
    const rKey=`${FUNNEL_STAGES[i].key}->${FUNNEL_STAGES[i+1].key}`;
    const r=FUNNEL_RATES[rKey];
    if(r===null||r===undefined){chainRate=null;break;}
    chainRate*=r;
    steps.push({from:FUNNEL_STAGES[i].label,to:FUNNEL_STAGES[i+1].label,rate:Math.round(r*100)});
  }

  if(!chainRate){
    if(resEl)resEl.textContent='—';if(rateEl)rateEl.textContent='sem dados';
    if(bdEl)bdEl.innerHTML='<div style="font-size:11px;color:var(--muted2);font-style:italic;">Dados insuficientes</div>';
    return;
  }

  const result=calcMode==='reverse'?Math.ceil(inputVal/chainRate):Math.floor(inputVal*chainRate);
  const chainPct=Math.round(chainRate*100);
  if(resEl)resEl.textContent=result;
  if(rateEl)rateEl.textContent=chainPct+'%';

  if(bdEl){
    bdEl.innerHTML=steps.map(s=>`
      <div class="calc-step">
        <span>${s.from} → ${s.to}</span>
        <span class="calc-step-rate">${s.rate}%</span>
      </div>`).join('');
  }
}

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'),4000);
}
</script>
